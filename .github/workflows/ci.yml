name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-test:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18.18.2, 22.x]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Validate release structure
        run: npm run validate

      - name: Run full offline suite (Linux and macOS)
        if: runner.os != 'Windows'
        run: npm test

      # The fake Grok executable is a POSIX process fixture. Until a genuine
      # shell:false Windows fixture is added, Windows provider behavior remains
      # explicitly unverified rather than being simulated inaccurately.
      - name: Run provider-neutral tests (Windows; provider unverified)
        if: runner.os == 'Windows'
        run: node --test tests/windows-neutral.test.mjs
