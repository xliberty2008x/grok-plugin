# Grok PR Review — same-repo non-draft PRs only.
# Security invariants:
# - No pull_request_target
# - Trusted runtime for scripts/plugin; PR head is git review target only
# - GROK_AUTH never shared with GITHUB_TOKEN in the same child process
# - Findings never fail the job; infra/auth/schema/post failures do
# - github.event.* never interpolated into shell double-quoted strings (use env:)
name: Grok PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: grok-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  grok-pr-review:
    name: Grok headless review
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository
      && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out PR head (code under review)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch base ref
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: git fetch origin "${BASE_REF}:refs/remotes/origin/${BASE_REF}"

      - name: Check out trusted runtime
        uses: actions/checkout@v4
        with:
          ref: ${{ vars.GROK_PR_REVIEW_TRUSTED_REF || 'main' }}
          path: _grok_trusted_src
          fetch-depth: 1

      - name: Isolate trusted runtime under RUNNER_TEMP
        run: |
          set -euo pipefail
          rm -rf "${RUNNER_TEMP}/grok-trusted"
          mv "${GITHUB_WORKSPACE}/_grok_trusted_src" "${RUNNER_TEMP}/grok-trusted"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install Grok Build CLI
        env:
          GROK_CLI_VERSION: ${{ vars.GROK_CLI_VERSION || '0.2.99' }}
        run: npm install -g "@xai-official/grok@${GROK_CLI_VERSION}"

      - name: Run trusted Grok review
        id: review
        env:
          GROK_AUTH_JSON: ${{ secrets.GROK_AUTH_JSON }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail
          OUT="${RUNNER_TEMP}/review-job.json"
          node "${RUNNER_TEMP}/grok-trusted/scripts/ci/run-trusted-review.mjs" \
            --trusted-root "${RUNNER_TEMP}/grok-trusted" \
            --workspace "${GITHUB_WORKSPACE}" \
            --base-ref "${BASE_REF}" \
            --out "${OUT}"
          echo "job_json=${OUT}" >> "$GITHUB_OUTPUT"

      - name: Collect PR diff for inline mapping
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git diff \
            "origin/${BASE_REF}...${HEAD_SHA}" \
            > "${RUNNER_TEMP}/pr.diff"

      - name: Post review to GitHub
        env:
          GH_TOKEN: ${{ github.token }}
          # Do not pass GROK_AUTH_JSON here
          JOB_JSON: ${{ steps.review.outputs.job_json }}
          PR_OWNER: ${{ github.repository_owner }}
          PR_REPO: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          node "${RUNNER_TEMP}/grok-trusted/scripts/ci/post-grok-review.mjs" \
            --job-json "${JOB_JSON}" \
            --diff "${RUNNER_TEMP}/pr.diff" \
            --owner "${PR_OWNER}" \
            --repo "${PR_REPO}" \
            --pr "${PR_NUMBER}" \
            --head-sha "${HEAD_SHA}"

      - name: Upload review job JSON on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: grok-review-job-${{ github.event.pull_request.number }}
          path: ${{ runner.temp }}/review-job.json
          if-no-files-found: ignore

      - name: Wipe staged Grok auth
        if: always()
        run: |
          set +e
          find "${RUNNER_TEMP}" -name 'auth.json' -type f -delete 2>/dev/null
          true
